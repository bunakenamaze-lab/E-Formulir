# Konfigurasi Nginx untuk PCNU Form Builder
# Letakkan di: /etc/nginx/sites-available/pcnu-forms
# Aktifkan dengan: ln -s /etc/nginx/sites-available/pcnu-forms /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name formulir.pcnubandung.or.id;  # Ganti dengan domain Anda

    # Redirect HTTP ke HTTPS (aktifkan setelah install SSL)
    # return 301 https://$server_name$request_uri;

    # Proxy semua request ke Node.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Upload file langsung ke Node.js (max 50MB)
    client_max_body_size 50M;
}

